<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#22d3ee"/>
      <stop offset="0.5" stop-color="#3b82f6"/>
      <stop offset="1" stop-color="#6d28d9"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.3" cy="0.2" r="0.9">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.35"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0.06"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="handle" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#dbeafe"/>
    </linearGradient>
    <linearGradient id="brush" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#bfdbfe"/>
    </linearGradient>
    <filter id="softShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#0c1e4a" flood-opacity="0.35"/>
    </filter>
    <filter id="iconShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="24" flood-color="#000000" flood-opacity="0.30"/>
    </filter>
  </defs>

  <!-- macOS squircle background with transparent margin -->
  <g filter="url(#iconShadow)">
    <rect x="100" y="100" width="824" height="824" rx="186" fill="url(#bg)"/>
    <rect x="100" y="100" width="824" height="824" rx="186" fill="url(#glow)"/>
  </g>

  <!-- broom, tilted -->
  <g transform="translate(472 512) rotate(-38)" filter="url(#softShadow)">
    <!-- handle -->
    <rect x="-26" y="-330" width="52" height="330" rx="26" fill="url(#handle)"/>
    <!-- collar -->
    <rect x="-52" y="-20" width="104" height="70" rx="30" fill="#eff6ff"/>
    <!-- brush body -->
    <path d="M -70 40
             C -70 20 -50 6 -30 6
             L 30 6
             C 50 6 70 20 70 40
             L 96 190
             C 100 216 80 238 54 238
             L -54 238
             C -80 238 -100 216 -96 190
             Z" fill="url(#brush)"/>
    <!-- bristle slits -->
    <rect x="-46" y="120" width="14" height="96" rx="7" fill="#3b82f6" opacity="0.35"/>
    <rect x="-7"  y="120" width="14" height="112" rx="7" fill="#3b82f6" opacity="0.35"/>
    <rect x="32"  y="120" width="14" height="96" rx="7" fill="#3b82f6" opacity="0.35"/>
  </g>

  <!-- sweep motion arcs -->
  <g stroke="#ffffff" stroke-linecap="round" fill="none" opacity="0.85">
    <path d="M 640 700 q 60 -14 96 -58" stroke-width="26"/>
    <path d="M 620 780 q 96 -20 150 -88" stroke-width="26" opacity="0.6"/>
  </g>

  <!-- sparkles -->
  <g fill="#ffffff" filter="url(#softShadow)">
    <path d="M 700 300 l 22 58 58 22 -58 22 -22 58 -22 -58 -58 -22 58 -22 Z"/>
    <path d="M 590 218 l 13 34 34 13 -34 13 -13 34 -13 -34 -34 -13 34 -13 Z" opacity="0.9"/>
    <path d="M 760 460 l 11 28 28 11 -28 11 -11 28 -11 -28 -28 -11 28 -11 Z" opacity="0.8"/>
  </g>
</svg>
